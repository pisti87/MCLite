; MCLite — MeshCore Companion Firmware
; PlatformIO Build Configuration
;
; Two firmware variants share most of this config:
;   [env:tdeck_plus]    LilyGo T-Deck Plus (320x240 ST7789, QWERTY+trackball)
;   [env:twatch_ultra]  LilyGo T-Watch Ultra (502x410 AMOLED, touch only) [WIP]

[env_base]
platform = espressif32@6.11.0
board = esp32-s3-devkitc-1
framework = arduino

; Flash & memory
board_build.flash_size = 16MB
board_build.partitions = partitions/partitions.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

monitor_speed = 115200
lib_ldf_mode = deep+

extra_scripts =
    pre:setup_hooks.py
    post:merge_firmware.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_LOOP_STACK_SIZE=24576   ; headroom for TLS (mbedtls) during WiFi OTA on the loop task
    -DRADIOLIB_GODMODE
    -DMAX_CONTACTS=40   ; 32 chat + 8 room
    -DMAX_GROUP_CHANNELS=16
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src
    -I .
    ; LoRa runtime defaults (overridden by config; same chip on both boards)
    -DLORA_FREQ=869.618
    -DLORA_BW=62.5
    -DLORA_SF=8
    -DLORA_TX_POWER=22
    -DLORA_CR=8
    ; SX1262 hardware config (same chip on both boards)
    -DSX126X_DIO3_TCXO_VOLTAGE=1.8f
    -DSX126X_DIO2_AS_RF_SWITCH=false
    -DSX126X_CURRENT_LIMIT=140
    -DSX126X_RX_BOOSTED_GAIN=1

lib_deps =
    lvgl/lvgl@^8.4.0
    lovyanGFX@^1.2.19
    bblanchon/ArduinoJson@^7.0.0
    jgromes/RadioLib@7.3.0
    mikalhart/TinyGPSPlus@^1.1.0
    densaugeo/base64@^1.4.0
    bitbank2/PNGdec@^1.0.3
    https://github.com/meshcore-dev/MeshCore.git#companion-v1.15.0


; ───────────────────────────────────────────────────────────────────────
; T-Deck Plus (production)
; Hardware pin definitions live in firmware/src/hal/boards/tdeck_plus.h
; ───────────────────────────────────────────────────────────────────────
[env:tdeck_plus]
extends = env_base
build_flags =
    ${env_base.build_flags}
    -DPLATFORM_TDECK
    -I .pio/libdeps/tdeck_plus/MeshCore/lib/ed25519
    ; LoRa pin aliases for MeshCore CustomSX1262::std_init() (consumed by MeshCore lib)
    -DP_LORA_NSS=9
    -DP_LORA_SCLK=40
    -DP_LORA_MISO=38
    -DP_LORA_MOSI=41
build_src_filter =
    +<*>
    -<hal/twatch/>


; ───────────────────────────────────────────────────────────────────────
; T-Watch Ultra
; Hardware pin definitions live in firmware/src/hal/boards/twatch_ultra.h
; ───────────────────────────────────────────────────────────────────────
[env:twatch_ultra]
extends = env_base
board = lilygo-t-watch-ultra
board_build.partitions = default_16MB.csv
board_build.f_cpu = 240000000L
; T-Watch Ultra hardware: ESP32-S3 with QSPI PSRAM (NOT OPI). The env_base
; memory_type "qio_opi" doesn't apply here — override explicitly.
board_build.arduino.memory_type = qio_qspi
build_flags =
    ${env_base.build_flags}
    -DPLATFORM_TWATCH
    -DBOARD_HAS_PSRAM
    -DCUSTOM_TOUCH_DRIVER
    -I .pio/libdeps/twatch_ultra/MeshCore/lib/ed25519
    ; LoRa pin aliases for MeshCore CustomSX1262::std_init()
    -DP_LORA_NSS=36
    -DP_LORA_SCLK=35
    -DP_LORA_MISO=33
    -DP_LORA_MOSI=34
lib_deps =
    ${env_base.lib_deps}
    lewisxhe/SensorLib@^0.4.1       ; CST92xx touch, XL9555 expander
    lewisxhe/XPowersLib@^0.2.5      ; AXP2101 PMU
; input/ and hal/tdeck/ are T-Deck-only.
build_src_filter =
    +<*>
    -<input/>
    -<hal/tdeck/>


; ───────────────────────────────────────────────────────────────────────
; Native unit tests (runs on host, no ESP32 needed)
; ───────────────────────────────────────────────────────────────────────
[env:native_test]
platform = native
build_flags =
    -std=c++17
    -DMAX_CONTACTS=40   ; 32 chat + 8 room
    -DUNIT_TEST
    -I test/stubs
    -I src
extra_scripts = pre:setup_hooks.py
test_framework = unity
test_filter = test_native/*
build_src_filter = -<*>
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
